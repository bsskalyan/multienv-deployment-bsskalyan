version: "3.8"

services:
  mongo-dev:
    image: mongo:6
    container_name: mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db
    networks:
      - multienv-net

  mongo-prod:
    image: mongo:6
    container_name: mongo-prod
    ports:
      - "27018:27017"
    volumes:
      - mongo-prod-data:/data/db
    networks:
      - multienv-net

  backend-dev:
    build: ./backend/dev
    container_name: backend-dev
    ports:
      - "3001:3001"
    env_file:
      - ./backend/dev/.env
    depends_on:
      - mongo-dev
    networks:
      - multienv-net

  backend-prod:
    build: ./backend/prod
    container_name: backend-prod
    ports:
      - "3002:3002"
    env_file:
      - ./backend/prod/.env
    depends_on:
      - mongo-prod
    networks:
      - multienv-net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_DEV_API=http://backend-dev:3001/api/tickets
      - REACT_APP_PROD_API=http://backend-prod:3002/api/tickets
    depends_on:
      - backend-dev
      - backend-prod
    networks:
      - multienv-net

networks:
  multienv-net:
    driver: bridge

volumes:
  mongo-dev-data:
  mongo-prod-data:
